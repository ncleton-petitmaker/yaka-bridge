## Méthodologie (REFONTE shell-first 2026-05-17)

### CONVENTION AGENTIC-FIRST (invariant absolu)

Lis `docs/agentic-first.md` avant de coder.

Chaque action visible dans l'UI doit avoir une ligne de parité :

```markdown
| UI action | server action | HTTP route | MCP tool | audit |
```

Cette table doit être ajoutée dans `factory-journal.md` ou complétée si `subprocess-driver` l'a commencée.

Règles :

- Le front appelle `lib/client.ts` uniquement.
- `lib/client.ts` appelle les routes Hono.
- Les routes Hono appellent `server/<domain>-actions.ts`.
- Les tools MCP appellent les mêmes actions.
- Si tu ajoutes un bouton sans action MCP équivalente, c'est un FAIL.
- Si une action n'est pas encore disponible côté serveur, affiche l'état disabled/TODO dans l'UI et logge le manque dans le journal ; ne crée pas une mutation front-only.

### CONVENTIONS DESIGN SYSTEM (TeamFactory — invariant absolu)

Toute UI domain DOIT respecter les conventions TeamFactory :

1. **Aucun hex hardcodé** dans les composants. Tous les styles passent par
   `var(--token)` ou `color-mix(in oklch, var(--accent) X%, transparent)`.
2. **Tokens disponibles** :
   - Surfaces : `--bg` (cream paper), `--surface` (white card), `--subtle` (hover/inset rows), `--bg-muted` (deeper inset)
   - Bordures : `--border` (1px hairline default), `--border-strong` (hover/active), `--border-soft` (sub-divider)
   - Texte : `--fg` (body), `--fg-strong` (heading), `--muted` (meta), `--soft` (tertiary), `--faint` (placeholder). Aliases `--text/--text-strong/--text-muted/--text-soft/--text-faint` exposés pour rétro-compat ; **prefer canonical names** dans le nouveau code.
   - Accent (rationné ≤2 uses/screen) : `--accent` (primary CTA + brand + 1 running row), `--accent-strong` (hover), `--accent-soft` (focus ring 3px)
   - Status tints (jamais l'accent) : `--green-fg/-bg/-border` (success), `--blue-fg/-bg/-border` (info), `--purple-fg/-bg/-border` (running/active + pulse), `--red-fg/-bg/-border` (error), `--amber-fg/-bg/-border` (awaiting input)
3. **Radius** : 6px (sm = pill chip / button), 10px (md = card / pane), 14px (lg = drawer / modal), 999px (full pill)
4. **Shadow** : `--shadow-xs/sm/md/lg`, jamais drop-shadow custom
5. **Type** :
   - h1/h2 avec `font-family: var(--serif)` (Source Serif Pro), font-weight 600, letter-spacing -0.02em
   - Body avec system sans, 13.5px base, line-height 1.5
   - Mono `--mono` uniquement pour IDs, paths, sha, tabular-nums sur les chiffres
6. **Motion** : `transition: ... 120ms ease`, animation `pulse` réservée à l'état "running" (1 seule row à la fois max)
7. **Pills pour state, cards pour objects** :
   - Status badge = `border-radius: 999px`, tint pill (status family fg/bg/border)
   - Card object = `background: var(--surface)`, `border: 1px solid var(--border)`, `border-radius: var(--radius-md)`, `box-shadow: var(--shadow-xs)`. Hover : `translateY(-1px) + --shadow-sm + --border-strong`.
8. **Tables** : `background: var(--surface)`, header `background: var(--subtle)`, row hover `background: var(--subtle)`, selected row `background: color-mix(in oklch, var(--accent) 8%, transparent)` (max 1 row à la fois).
9. **3-panels** : ResizeHandle invisible (1px border-color), hover `--border-strong`. Panel sidebar `background: var(--surface)`, center `--bg`, droit `--surface`.
10. **PanelLayout3 collapse safety** : tout panneau collapsible DOIT avoir un toggle visible permanent lorsqu'il est replié. Le pattern est INTÉGRÉ dans `components/PanelLayout3.tsx` du template (un `CollapsedSliver` 32px se déplie automatiquement sur le bord du layout quand `onCollapse` est déclenché, avec icône `panel-left-open` / `panel-right-open`). Donc tant que tu utilises `<PanelLayout3 leftPanel={...} centerPanel={...} rightPanel={...} />`, l'utilisateur ne peut JAMAIS perdre l'accès à un panneau. Si tu utilises `<PanelGroup>` / `<Panel>` directement (non recommandé, hors-scope du template), tu DOIS exposer un `CollapsedToggle` visible permanent (cf. pattern OIF-eval `evaluation/page.tsx:805+`) — sinon le user perd l'accès au panel et c'est un bug bloquant.

**Test conformité** : avant de finir, grep ton output pour `#[0-9a-f]{3,6}` — toute occurrence (hors commentaire `/* ... */`) est un FAIL.

### CONVENTIONS UX OPÉRATIONNELLES (invariants — voir `docs/factory-invariants.md` §1.6)

Ces règles s'appliquent à toute page que tu produis. Ce ne sont pas des
suggestions — un PR qui les viole doit être refusé.

**UX-R1 · Pas de landing intermédiaire**
- `app/page.tsx` est un `redirect("/runs")` côté serveur. Tu n'y touches pas
  et tu ne ré-introduis pas de Hero/CTA sur `/`.
- Si le brief demande une "page d'accueil", crée `/home` ou `/overview` —
  jamais sur `/`.

**UX-R2 · Tout run/batch long doit être stoppable à tout moment**
- Dans `app/runs/page.tsx`, `app/<entities>/[id]/page.tsx`, et le drawer
  detail : si `status === "running"`, **un bouton "Annuler" / "Stopper" est
  visible en permanence**. Pas désactivé en attendant un event, pas caché
  derrière un menu, pas seulement sur la page détail.
- Il appelle `cancelRun(id)` / `cancelBatch(id)` / `cancel<Entity>(id)` du
  `lib/client.ts`. Si la fonction n'existe pas pour ton entité, tu
  l'ajoutes (POST `/api/<entité>/:id/cancel`).
- L'état local passe en "cancelling…" au clic, le SSE confirme par
  `<entity>_done` avec status `cancelled` ou `failed`.
- Le bouton est présent **à la fois** dans la sidebar liste (au survol d'un
  run actif) et dans le panel center / drawer du run actif.

**UX-R3 · Live progress toujours visible pendant un run**
- Pendant qu'un run/batch tourne, le panel center montre **toujours** le
  stream live (events SSE, progress bar, ligne-par-étape, dernier message).
  Aucun "le batch tourne, revenez plus tard".
- Tu utilises systématiquement le pattern `<EntityStreamPanel>` (variante
  de `StreamingPanel` du template) avec :
    - barre de progression (% complété, "N / total")
    - liste live des étapes/questions avec leur status (icône + tint)
    - dernier event SSE en bas, auto-scroll
    - re-subscription automatique au retour sur la page (le SSE reprend là
      où il en est)
- Si le domaine a un artefact visuel intermédiaire (capture d'écran d'app
  pilotée, render preview, plot live…), tu ajoutes un `<LiveXxxPanel>` en
  panel-right qui se rafraîchit à chaque event pertinent. Il s'affiche
  pendant le run, pas seulement à la fin.
- Events SSE minimum à streamer (à coordonner avec `runner-author`) :
  `<entity>_start`, `<step>_done` (un par étape granulaire),
  `<entity>_done`, `error`. Pas de "tout d'un coup à la fin".

**UX-R4 · Pas de double-clic mort**
- Aucun écran ne doit avoir comme seule action "cliquer pour passer à
  l'écran suivant". Si tu te retrouves à dessiner un Hero + 1 CTA →
  c'est UX-R1, supprime l'écran et redirige.

**UX-R5 · Pas de stockage local visible par défaut**
- Les apps générées sont des services web Bridge + Supabase. Tu ne crées pas
  de section `/settings` demandant à l'utilisateur de choisir des dossiers
  locaux `input/output/audit`.
- Les données métier vont dans Supabase Postgres ; les fichiers durables vont
  dans Supabase Storage ou dans un stockage objet explicitement raccordé.
- Le stockage local est interne au Bridge desktop et cloisonné par service.
  Il ne doit pas apparaître comme réglage utilisateur d'une app web.
- Un picker de dossier n'est autorisé que si le brief demande explicitement un
  workflow local/offline. Dans ce cas, il doit être placé dans un écran métier
  clair ou dans `Réglages > Avancé`, jamais comme section générique.

