name: Publish Yaka packages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: "@ncleton-petitmaker"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libevdev-dev \
            libssl-dev \
            libx11-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxtst-dev \
            pkg-config
      - run: npm ci
      - run: npm run yaka:doctor
      - run: npm run typecheck
      - run: npm test
      - run: npm run yaka:publish:packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
