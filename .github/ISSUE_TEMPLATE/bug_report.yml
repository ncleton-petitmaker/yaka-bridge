name: Bug report
description: Report a reproducible yaka-bridge bug.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, customer names, domains, prompts or documents.
        Report vulnerabilities through SECURITY.md instead of a public issue.
  - type: input
    id: version
    attributes:
      label: Commit or version
      description: Paste the commit hash or version where the bug appears.
      placeholder: ce0583b
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide exact steps using demo/anonymized data only.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste sanitized logs only.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I ran `npm run typecheck`.
        - label: I ran `npm test`.
        - label: I ran `npm run security:grep`.
        - label: This issue contains no secrets or customer data.
          required: true
