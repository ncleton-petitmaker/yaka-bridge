<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" role="img" aria-labelledby="title desc">
  <title id="title">Routes de communication du Bridge local</title>
  <desc id="desc">Schema pedagogique montrant comment un site web cloud utilise une IA locale via un bridge installe sur le poste utilisateur.</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#15803d"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; filter: url(#shadow); }
      .cloud { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 2; }
      .local { fill: #ecfdf5; stroke: #bbf7d0; stroke-width: 2; }
      .ai { fill: #fff7ed; stroke: #fed7aa; stroke-width: 2; }
      .data { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 2; }
      .title { font: 800 34px system-ui, -apple-system, Segoe UI, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px system-ui, -apple-system, Segoe UI, sans-serif; fill: #475569; }
      .box-title { font: 800 23px system-ui, -apple-system, Segoe UI, sans-serif; fill: #0f172a; }
      .box-sub { font: 500 15px system-ui, -apple-system, Segoe UI, sans-serif; fill: #475569; }
      .small { font: 600 13px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #334155; }
      .note { font: 500 13px system-ui, -apple-system, Segoe UI, sans-serif; fill: #64748b; }
      .badge { fill: #0f172a; }
      .badge-text { font: 800 14px system-ui, -apple-system, Segoe UI, sans-serif; fill: #ffffff; }
      .arrow-label { font: 800 14px system-ui, -apple-system, Segoe UI, sans-serif; fill: #0f172a; }
      .arrow-detail { font: 600 12px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #334155; }
      .blue { stroke: #2563eb; }
      .green { stroke: #15803d; }
      .amber { stroke: #b45309; }
      .muted { stroke: #94a3b8; }
      .line { stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 10 9; }
    </style>
  </defs>

  <rect class="bg" width="1440" height="980"/>
  <text x="70" y="72" class="title">Comment un site web utilise une IA locale via Bridge</text>
  <text x="70" y="105" class="subtitle">Le navigateur ne controle pas directement l'ordinateur : le bridge local interroge le cloud, execute en local, puis renvoie le flux.</text>

  <rect x="50" y="150" width="390" height="670" rx="22" class="panel"/>
  <text x="80" y="195" class="box-title">1. Navigateur web</text>
  <text x="80" y="222" class="box-sub">Site cloud / app Next.js</text>
  <rect x="82" y="260" width="315" height="108" rx="16" class="cloud"/>
  <text x="108" y="298" class="box-title" style="font-size:20px">Utilisateur</text>
  <text x="108" y="326" class="box-sub">Clique sur "lancer", depose</text>
  <text x="108" y="350" class="box-sub">un fichier, suit le resultat.</text>
  <rect x="82" y="405" width="315" height="122" rx="16" class="data"/>
  <text x="108" y="443" class="box-title" style="font-size:19px">Routes UI</text>
  <text x="108" y="472" class="small">GET /api/bridge/status</text>
  <text x="108" y="497" class="small">GET http://127.0.0.1:7707/api/health</text>
  <rect x="82" y="565" width="315" height="115" rx="16" class="cloud"/>
  <text x="108" y="603" class="box-title" style="font-size:19px">Demande metier</text>
  <text x="108" y="632" class="small">POST /api/runs</text>
  <text x="108" y="657" class="note">En mode cloud, la demande devient un job.</text>

  <rect x="525" y="150" width="390" height="670" rx="22" class="panel"/>
  <text x="555" y="195" class="box-title">2. Cloud / Control Plane</text>
  <text x="555" y="222" class="box-sub">API web, auth, file de jobs</text>
  <rect x="555" y="260" width="330" height="118" rx="16" class="cloud"/>
  <text x="582" y="300" class="box-title" style="font-size:20px">Auth + organisation</text>
  <text x="582" y="330" class="small">Authorization: Bearer ...</text>
  <text x="582" y="354" class="small">x-bridge-organization-id</text>
  <rect x="555" y="420" width="330" height="138" rx="16" class="cloud"/>
  <text x="582" y="458" class="box-title" style="font-size:20px">File de jobs</text>
  <text x="582" y="488" class="small">status = queued</text>
  <text x="582" y="513" class="small">leaseId quand le bridge poll</text>
  <text x="582" y="538" class="note">Le cloud stocke l'intention, pas l'IA.</text>
  <rect x="555" y="600" width="330" height="126" rx="16" class="data"/>
  <text x="582" y="638" class="box-title" style="font-size:20px">Flux resultat</text>
  <text x="582" y="668" class="small">POST /bridge/jobs/events</text>
  <text x="582" y="693" class="small">POST /bridge/jobs/complete</text>

  <rect x="1000" y="150" width="390" height="670" rx="22" class="panel"/>
  <text x="1030" y="195" class="box-title">3. Ordinateur autorise</text>
  <text x="1030" y="222" class="box-sub">Bridge + IA locale + fichiers locaux</text>
  <rect x="1030" y="260" width="330" height="130" rx="16" class="local"/>
  <text x="1058" y="298" class="box-title" style="font-size:20px">Bridge local</text>
  <text x="1058" y="328" class="small">npm run bridge -- run</text>
  <text x="1058" y="353" class="small">poll toutes les ~5 s</text>
  <text x="1058" y="376" class="note">Il initie les appels sortants HTTPS.</text>
  <rect x="1030" y="435" width="330" height="132" rx="16" class="ai"/>
  <text x="1058" y="473" class="box-title" style="font-size:20px">Moteur IA local</text>
  <text x="1058" y="503" class="small">startRun() -&gt; codex/claude CLI</text>
  <text x="1058" y="528" class="small">events: text_delta, tool_use, usage...</text>
  <text x="1058" y="552" class="note">Le calcul et les outils tournent ici.</text>
  <rect x="1030" y="610" width="330" height="116" rx="16" class="data"/>
  <text x="1058" y="648" class="box-title" style="font-size:20px">Perimetre local</text>
  <text x="1058" y="678" class="small">dataDir, allowedRoots, addDirs</text>
  <text x="1058" y="703" class="small">sandbox + permissions</text>

  <path d="M397 623 C455 623 470 490 555 490" class="line blue" marker-end="url(#arrow-blue)"/>
  <circle cx="463" cy="574" r="18" class="badge"/><text x="458" y="579" class="badge-text">1</text>
  <text x="422" y="536" class="arrow-label">La demande part au cloud</text>
  <text x="422" y="558" class="arrow-detail">POST /api/runs ou action serveur</text>

  <path d="M1030 315 C970 315 945 318 885 318" class="line green" marker-end="url(#arrow-green)"/>
  <circle cx="953" cy="288" r="18" class="badge"/><text x="948" y="293" class="badge-text">2</text>
  <text x="903" y="248" class="arrow-label">Le bridge s'enregistre</text>
  <text x="903" y="270" class="arrow-detail">POST /bridge/register + /bridge/sync</text>

  <path d="M1030 356 C968 407 950 468 885 490" class="line green" marker-end="url(#arrow-green)"/>
  <circle cx="957" cy="422" r="18" class="badge"/><text x="952" y="427" class="badge-text">3</text>
  <text x="925" y="456" class="arrow-label">Il poll les jobs</text>
  <text x="925" y="478" class="arrow-detail">POST /bridge/jobs/poll</text>

  <path d="M885 526 C945 526 962 505 1030 501" class="line blue" marker-end="url(#arrow-blue)"/>
  <circle cx="958" cy="536" r="18" class="badge"/><text x="953" y="541" class="badge-text">4</text>
  <text x="900" y="583" class="arrow-label">Le job loue revient au poste</text>
  <text x="900" y="605" class="arrow-detail">prompt, model, addDirs, sandbox</text>

  <path d="M1195 390 L1195 435" class="line amber" marker-end="url(#arrow-amber)"/>
  <circle cx="1228" cy="413" r="18" class="badge"/><text x="1223" y="418" class="badge-text">5</text>
  <text x="1238" y="407" class="arrow-label">Execution locale</text>
  <text x="1238" y="429" class="arrow-detail">startRun()</text>

  <path d="M1195 567 L1195 610" class="line amber" marker-end="url(#arrow-amber)"/>
  <circle cx="1228" cy="590" r="18" class="badge"/><text x="1223" y="595" class="badge-text">6</text>
  <text x="1238" y="584" class="arrow-label">Acces controle</text>
  <text x="1238" y="606" class="arrow-detail">allowedRoots / sandbox</text>

  <path d="M1030 667 C964 667 945 668 885 668" class="line green" marker-end="url(#arrow-green)"/>
  <circle cx="957" cy="694" r="18" class="badge"/><text x="952" y="699" class="badge-text">7</text>
  <text x="908" y="729" class="arrow-label">Le bridge remonte le live</text>
  <text x="908" y="751" class="arrow-detail">/bridge/jobs/events puis complete</text>

  <path d="M555 668 C480 668 465 650 397 650" class="line blue dash" marker-end="url(#arrow-blue)"/>
  <circle cx="467" cy="694" r="18" class="badge"/><text x="462" y="699" class="badge-text">8</text>
  <text x="275" y="734" class="arrow-label">Le navigateur affiche le suivi</text>
  <text x="275" y="756" class="arrow-detail">SSE / polling / API cloud</text>

  <path d="M397 467 C470 430 940 232 1030 315" class="line muted dash" marker-end="url(#arrow-green)"/>
  <circle cx="712" cy="316" r="18" class="badge"/><text x="707" y="321" class="badge-text">0</text>
  <text x="485" y="300" class="arrow-label">Optionnel : test local de presence</text>
  <text x="485" y="322" class="arrow-detail">GET 127.0.0.1:7707/api/health</text>

  <rect x="70" y="865" width="1300" height="70" rx="18" fill="#0f172a"/>
  <text x="105" y="895" style="font:800 19px system-ui,-apple-system,Segoe UI,sans-serif;fill:#fff">Idee cle</text>
  <text x="105" y="922" style="font:500 17px system-ui,-apple-system,Segoe UI,sans-serif;fill:#dbeafe">Le web ne pousse pas une commande dans le poste. Le bridge local, authentifie et autorise, vient chercher le travail, l'execute dans un perimetre local controle, puis renvoie les evenements.</text>
</svg>
